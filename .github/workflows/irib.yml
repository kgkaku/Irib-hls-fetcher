name: Refresh IRIB Channels

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/irib.yml'

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Decode and create script from secret
      run: |
        echo "${{ secrets.MAIN_PY }}" | base64 -d > irib.py
        chmod +x irib.py
        echo "Script created successfully"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run IRIB Extractor
      run: python irib.py

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git pull origin main --rebase
        git add irib.m3u irib_extvlcopt.m3u irib.json epg.xml
        git diff --staged --quiet || git commit -m "Auto-refresh IRIB channels with EPG [$(date +'%Y-%m-%d %H:%M:%S')]"
        git push origin main
